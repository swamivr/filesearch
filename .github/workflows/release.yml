# Build standalone executables for Windows, macOS, and Linux
# and attach them to a GitHub Release.
#
# Triggered when a version tag is pushed:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: filesearch-linux
          - os: macos-latest
            artifact: filesearch-macos
          - os: windows-latest
            artifact: filesearch-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pypdf

      - name: Build executable
        run: pyinstaller filesearch.spec

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv dist/filesearch dist/${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv dist/filesearch.exe dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
